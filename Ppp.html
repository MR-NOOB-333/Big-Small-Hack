<!DOCTYPE html>

<html lang="bn">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Prediction Viewer HD</title>

  <style>

    /* আগের স্টাইল কোড অপরিবর্তিত থাকবে (তোমার দেওয়া অনুযায়ী) */

    body {

      background: #111;

      color: #fff;

      text-align: center;

      font-family: Arial, sans-serif;

      padding: 10px;

      display: flex;

      justify-content: start;

      align-items: center;

      flex-direction: column;

      height: 100vh;

      margin: 0;

      overflow-y: auto;

      position: relative;

    }



    #particles-js {

      position: fixed;

      top: 0;

      left: 0;

      width: 100%;

      height: 100%;

      z-index: 0;

    }



    .top-box, .image-box, .keyboard-row, .youtube-embed, #searchText, input, button, #popupBox {

      z-index: 1;

      position: relative;

    }



    .top-box {

      width: 100px;

      height: 100px;

      background-color: #222;

      border: 2px solid #00ffcc;

      border-radius: 8px;

      display: flex;

      justify-content: center;

      align-items: center;

      overflow: hidden;

      flex-direction: column;

    }



    .top-box img {

      width: 100px;

      height: 100px;

      margin: 3px 0;

    }



    #topImageContainer {

      display: flex;

      justify-content: center;

      gap: 12px;

      margin-bottom: 16px;

    }



    .image-box {

      position: relative;

      width: 230px;

      height: 120px;

      background-color: #333;

      display: flex;

      justify-content: center;

      align-items: center;

      border: 2px solid #00ffcc;

      border-radius: 8px;

      margin-bottom: 10px;

      overflow: hidden;

    }



    .image-box img {

      width: 200px;

      height: 90px;

    }



    @keyframes zoomIn {

      0% { transform: scale(0.2); opacity: 0; }

      100% { transform: scale(1); opacity: 1; }

    }



    @keyframes zoomOut {

      0% { transform: scale(1); opacity: 1; }

      100% { transform: scale(0); opacity: 0; }

    }



    img.animate-in {

      animation: zoomIn 0.6s ease-out;

    }



    img.animate-out {

      animation: zoomOut 0.6s ease-in forwards;

    }



    input {

      width: 45px;

      font-size: 22px;

      margin: 2px;

      text-align: center;

      padding: 8px;

      background-color: #333;

      border: 2px solid #00ffcc;

      border-radius: 5px;

      color: white;

    }



    .keyboard-row {

      display: flex;

      justify-content: center;

      gap: 6px;

      margin: 6px 0;

    }



    .keyboard-row button, button {

      width: 55px;

      height: 55px;

      font-size: 20px;

      border-radius: 10px;

      background-color: #222;

      border: 2px solid #00ffcc;

      color: white;

      cursor: pointer;

    }



    button.clear-btn {

      width: 120px;

      height: 60px;

      font-size: 22px;

      font-weight: bold;

      background-color: #333;

      margin-top: 10px;

    }



    #popupBox {

      display: none;

      position: fixed;

      top: 50%;

      left: 50%;

      transform: translate(-50%, -50%);

      background-color: #222;

      color: white;

      padding: 20px;

      border-radius: 10px;

      z-index: 100;

      font-size: 24px;

      font-weight: bold;

      border: 4px solid #00ffcc;

      box-shadow: 0 0 15px #00ffcc;

    }



    #searchText {

      margin-top: 8px;

      font-size: 22px;

      font-weight: bold;

      color: #00ffcc;

    }



    .youtube-embed {

      margin-top: 12px;

      width: 210px;

      height: 350px;

      background-color: #222;

      border: 2px solid #FF0000;

      display: flex;

      justify-content: center;

      align-items: center;

    }



    .youtube-embed iframe {

      width: 100%;

      height: 100%;

    }

  #n1 {

    width: 35px;

    font-size: 18px;

    padding: 8px;

  }



  #n2 {

    width: 35px;

    font-size: 18px;

  }



  #n3 {

    width: 35px;

    font-size: 18px;

  }



  #n4 {

    width: 35px;

    font-size: 18px;

  }



  #n5 {

    width: 35px;

    font-size: 18px;

  }



  #n6 {

    width: 35px;

    font-size: 18px;

  }

  </style>

</head>

<body>



  <div id="particles-js"></div>



  <div id="topImageContainer">

    <div class="top-box" id="box1"></div>

    <div class="top-box" id="box2"></div>

    <div class="top-box" id="box3"></div>

  </div>



  <div class="image-box" id="imageBox"></div>

  <div id="searchText"></div>



  <div>

    <input type="number" id="n6" min="0" max="9" oninput="checkPattern()">

    <input type="number" id="n5" min="0" max="9" oninput="checkPattern()">

    <input type="number" id="n4" min="0" max="9" oninput="checkPattern()">

    <input type="number" id="n3" min="0" max="9" oninput="checkPattern()">

    <input type="number" id="n2" min="0" max="9" oninput="checkPattern()">

    <input type="number" id="n1" min="0" max="9" oninput="checkPattern()">

  </div>



  <div class="keyboard-row">

    <button onclick="addNumber(1)">1</button>

    <button onclick="addNumber(2)">2</button>

    <button onclick="addNumber(3)">3</button>

    <button onclick="addNumber(4)">4</button>

    <button onclick="addNumber(5)">5</button>

  </div>

  <div class="keyboard-row">

    <button onclick="addNumber(6)">6</button>

    <button onclick="addNumber(7)">7</button>

    <button onclick="addNumber(8)">8</button>

    <button onclick="addNumber(9)">9</button>

    <button onclick="addNumber(0)">0</button>

  </div>





  <button class="clear-btn" onclick="checkSecondDataset()">DATA</button>



  <div id="popupBox"><p id="popupText"></p></div>



  <div class="youtube-embed">

    <iframe src="https://hgzy.in/#/register?invitationCode=614381064703" frameborder="0" allowfullscreen></iframe>

  </div>



  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>



  <script>

    particlesJS('particles-js', {

      "particles": {

        "number": { "value": 60, "density": { "enable": true, "value_area": 800 }},

        "color": { "value": "#00ffcc" },

        "shape": { "type": "circle" },

        "opacity": { "value": 0.5 },

        "size": { "value": 3 },

        "line_linked": {

          "enable": true,

          "distance": 150,

          "color": "#00ffcc",

          "opacity": 0.4,

          "width": 1

        },

        "move": { "enable": true, "speed": 2 }

      },

      "interactivity": {

        "events": {

          "onhover": { "enable": true, "mode": "repulse" },

          "onclick": { "enable": true, "mode": "push" }

        }

      }

    });



    let datasetBS = [], datasetRG = [];

    let datasetBS2 = [], datasetRG2 = [];



    fetch('https://raw.githubusercontent.com/Nyeem122-8/Text-b-s-r-g/refs/heads/main/dataset.json')

      .then(res => res.json()).then(data => datasetBS = data);



    fetch('https://raw.githubusercontent.com/Nyeem122-8/Text-b-s-r-g/refs/heads/main/dataset1.json')

      .then(res => res.json()).then(data => datasetRG = data);



    fetch('https://raw.githubusercontent.com/Nyeem122-8/Jdjdjjfjfj/refs/heads/main/dataset.json')

      .then(res => res.json()).then(data => datasetBS2 = data);



    fetch('https://raw.githubusercontent.com/Nyeem122-8/Jdjdjjfjfj/refs/heads/main/dataset1.json')

      .then(res => res.json()).then(data => datasetRG2 = data);



    function numToBS(num) { return num >= 5 ? "B" : "S"; }

    function numToRG(num) { return [1,3,5,7,9].includes(num) ? "G" : "R"; }



    function findMatch(dataset, pattern) {

      for (let i = dataset.length - pattern.length; i >= 1; i--) {

        let slice = dataset.slice(i - pattern.length, i);

        if (JSON.stringify(slice) === JSON.stringify(pattern)) {

          return dataset[i];

        }

      }

      return null;

    }



    function checkPattern() {

      let inputs = [];

      for (let i = 6; i >= 1; i--) {

        let val = document.getElementById("n" + i).value;

        if (val !== "") inputs.push(parseInt(val));

      }



      if (inputs.length < 1) {

        document.getElementById("imageBox").innerHTML = "<p style='color:#ff4444;'>কমপক্ষে ২টি সংখ্যা দিন।</p>";

        return;

      }



      let bsPattern = inputs.map(numToBS).reverse();

      let rgPattern = inputs.map(numToRG).reverse();



      let matchBS = findMatch(datasetBS, bsPattern);

      let matchRG = findMatch(datasetRG, rgPattern);



      let imageBox = document.getElementById("imageBox");

      imageBox.innerHTML = "";



      if (matchBS && matchRG) {

        let combo = matchBS + matchRG;

        let imageName = combo + ".png";

        let img = document.createElement("img");

        img.src = imageName;

        img.alt = combo;

        img.classList.add("animate-in");

        imageBox.appendChild(img);

        showPopup(combo);

        updateTopBoxes(combo);



        setTimeout(() => {

          if (img) {

            img.classList.remove("animate-in");

            img.classList.add("animate-out");

            setTimeout(() => imageBox.innerHTML = "", 600);

          }

        }, 600000);

      } else {

        imageBox.innerHTML = "<p style='color:#ff4444;'>মিল পাওয়া যায়নি।</p>";

      }

    }



    function updateTopBoxes(combo) {

      const topImages = {

        SR: ['num0.png', 'num2.png', 'num4.png'],

        SG: ['num1.png', 'num3.png'],

        BG: ['num5.png', 'num7.png', 'num9.png'],

        BR: ['num6.png', 'num8.png']

      };



      ['box1', 'box2', 'box3'].forEach(id => document.getElementById(id).innerHTML = "");



      for (let key in topImages) {

        if (combo.includes(key)) {

          topImages[key].forEach((src, index) => {

            const img = document.createElement("img");

            img.src = src;

            document.getElementById("box" + (index + 1)).appendChild(img);

          });

          break;

        }

      }

    }



    function addNumber(num) {

      for (let i = 6; i >= 1; i--) {

        let input = document.getElementById("n" + i);

        if (input.value === "") {

          input.value = num;

          break;

        }

      }

      checkPattern();

    }



    function clearInputs() {

      for (let i = 1; i <= 6; i++) {

        document.getElementById("n" + i).value = "";

      }

      const img = document.querySelector("#imageBox img");

      if (img) {

        img.classList.remove("animate-in");

        img.classList.add("animate-out");

        setTimeout(() => document.getElementById("imageBox").innerHTML = "", 600);

      }

      ['box1', 'box2', 'box3'].forEach(id => document.getElementById(id).innerHTML = "");

      document.getElementById("searchText").innerText = "";

    }



    function showPopup(text) {

      let popupBox = document.getElementById('popupBox');

      let popupText = document.getElementById('popupText');

      popupText.innerHTML = text;

      popupBox.style.display = 'block';

      setTimeout(() => popupBox.style.display = 'none', 1000);

    }



    function checkSecondDataset() {

      let inputs = [];

      for (let i = 6; i >= 1; i--) {

        let val = document.getElementById("n" + i).value;

        if (val !== "") inputs.push(parseInt(val));

      }



      if (inputs.length !== 6) {

        showPopup("৬টি সংখ্যা পূরণ করুন");

        return;

      }



      let bsPattern = inputs.map(numToBS).reverse();

      let rgPattern = inputs.map(numToRG).reverse();



      let matchBS = findMatch(datasetBS2, bsPattern);

      let matchRG = findMatch(datasetRG2, rgPattern);



      if (matchBS && matchRG) {

        let result = matchBS + matchRG;

        let imageMap = {

          "SG": "SG1.png",

          "SR": "SR2.png",

          "BG": "BG1.png",

          "BR": "BR2.png"

        };

        showPopupImage(imageMap[result] || "");

      } else {

        showPopupImage("");

      }



      // Clear inputs and images after 3 seconds

      setTimeout(() => {

        clearInputs();

      }, 5000);

    }



    function showPopupImage(imageName) {

      let popupBox = document.getElementById('popupBox');

      let popupText = document.getElementById('popupText');



      if (imageName) {

        popupText.innerHTML = `<img src="${imageName}" alt="${imageName}" style="width: 120px; height: auto;">`;

      } else {

        popupText.innerHTML = "মিল পাওয়া যায়নি।";

      }



      popupBox.style.display = 'block';

      setTimeout(() => popupBox.style.display = 'none', 5000);

    }

  </script>



</body>

</html>
